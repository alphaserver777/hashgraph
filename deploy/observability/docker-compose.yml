# Observability-стек MDRJ-DAG: Prometheus + Grafana.
#
# Разворачивается на одном хосте (по умолчанию dev1-robots — на нём
# 64 GB RAM, есть запас). Scrape-ит 3 узла кластера через публичные
# IP. Дашборд Grafana автопровизионится из ./grafana/dashboards/.
#
# Запуск:
#   cd /opt/mdrj-observability && docker compose up -d
#
# URL: http://<this-host>:3000  (admin / mdrj-stand-2026)

services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: mdrj-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: mdrj-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: mdrj-stand-2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
