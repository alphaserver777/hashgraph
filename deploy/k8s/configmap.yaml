apiVersion: v1
kind: ConfigMap
metadata:
  name: mdrj-node-config
  namespace: mdrj
data:
  node.yaml: |
    node_id: ${POD_NAME}
    listen: 0.0.0.0:9001
    peers: []

    profile:
      role: node
      memory_mb: 128
      bw_kbps: 4096
      cpu_quota: 1.0
      threat_level: HIGH

    gossip:
      period_sec: 1.0
      fan_out: 3

    prioritization:
      level_threshold_B: LOW
      max_batch_bytes: 65536

    security:
      hmac_key: ${MDRJ_HMAC_KEY}

    storage:
      sqlite_path: /data/node.db

    linux_ingest:
      enabled: false

    collectors:
      proc:
        enabled: true
        poll_interval_sec: 5.0

    retention:
      enabled: true
      max_age_days: 1
      keep_class_a: true
      poll_interval_sec: 60.0
      archive_path: /data/archive.jsonl

    discovery:
      mode: k8s
      poll_interval_sec: 5.0
      auto_approve_discovered: true
      k8s_service: mdrj-headless.mdrj.svc.cluster.local
      k8s_target_port: 9001

    notifier:
      enabled: false
      trigger_classes: ["A"]
